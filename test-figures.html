<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  body{margin:0;background:#0d2630;display:flex;flex-wrap:wrap;gap:18px;padding:20px;font-family:sans-serif}
  .stage{width:440px;height:360px;background:linear-gradient(180deg,#123540,#0a1d25);border:1px solid rgba(255,255,255,.09);border-radius:18px;position:relative;overflow:hidden}
  .stage svg{display:block;width:100%;height:100%}
  .tag{position:absolute;top:14px;left:14px;font:700 11px sans-serif;letter-spacing:.18em;color:#6fd6e6;background:rgba(13,38,48,.7);padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.09)}
</style>
</head>
<body>
  <div class="stage"><span class="tag">Air Flow</span>
    <svg id="breathFace" viewBox="0 0 360 360" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

<script>
const ink='#37474c', skin='#f1c49b', skinL='#e6ab7d', hair='#3a2d28', lip='#d98a72', lipL='#c06b56';
function breathFaceSVG(gap){
  return `
  <!-- neck/torso hint -->
  <path d="M183 226 C183 248 184 264 232 276 L262 360 L116 360 L150 296 C174 288 175 264 176 244 Z" fill="#2f5a66" stroke="#21434c" stroke-width="2"/>
  <!-- neck -->
  <path d="M178 200 L178 232 C178 250 196 258 210 256 L208 200 Z" fill="${skin}" stroke="${ink}" stroke-width="2.2"/>
  <!-- face -->
  <path d="M156 74
    C196 70 226 98 226 136
    C226 148 224 155 232 162
    C237 167 240 173 234 179
    C230 184 222 184 216 184
    C214 188 214 191 211 194
    C209 199 210 203 216 208
    C222 214 222 220 214 226
    C208 231 199 233 190 233
    L189 244
    C189 258 186 268 176 274
    C150 286 120 264 110 222
    C100 182 100 130 122 100
    C134 84 142 76 156 74 Z"
    fill="${skin}" stroke="${ink}" stroke-width="2.4"/>
  <!-- ear -->
  <path d="M146 176 C137 174 134 190 142 200 C148 207 156 203 156 194 C153 196 148 192 149 186 C150 181 150 177 146 176 Z" fill="${skin}" stroke="${ink}" stroke-width="2"/>
  <!-- cheek -->
  <circle cx="198" cy="178" r="11" fill="#e89178" opacity=".28"/>
  <!-- hair (crown + back + sideburn) -->
  <path d="M214 104
    C200 84 172 74 150 78
    C126 82 110 108 105 146
    C101 182 108 216 120 242
    C123 250 132 254 138 256
    C135 230 136 202 140 184
    C143 168 150 160 152 150
    C158 130 152 112 172 100
    C186 92 204 94 214 104 Z" fill="${hair}"/>
  <path d="M214 104 C220 116 222 128 221 140 C214 120 202 104 186 100 C198 98 208 99 214 104 Z" fill="${hair}"/>
  <!-- eyebrow -->
  <path d="M200 144 Q210 139 220 145" fill="none" stroke="#4a3a2f" stroke-width="3" stroke-linecap="round"/>
  <!-- eye (calm, focused, slight downward gaze) -->
  <path d="M202 155 Q210 151 218 155 Q210 159 202 155 Z" fill="#fdfbf6"/>
  <circle cx="211" cy="156" r="2.7" fill="#3a2a20"/>
  <path d="M202 155 Q210 150 218 154" fill="none" stroke="${ink}" stroke-width="1.7" stroke-linecap="round"/>
  <!-- nostril -->
  <path d="M226 174 Q221 177 218 175" fill="none" stroke="#bd8056" stroke-width="2" stroke-linecap="round"/>
  <!-- lips, aperture-driven gap -->
  <path d="M205 191 Q214 187 223 192 Q215 195 207 194 Z" fill="${lip}" stroke="${lipL}" stroke-width="1"/>
  <path d="M206 ${198+gap*0.35} Q215 ${201+gap} 222 ${198+gap*0.35} Q215 ${200+gap*0.5} 207 ${199+gap*0.3} Z" fill="${lip}" stroke="${lipL}" stroke-width="1"/>
  `;
}
document.getElementById('breathFace').innerHTML = breathFaceSVG(5);
</script>
</body>
</html>
