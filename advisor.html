  .sec p{font-size:14px}
  .menuList{list-style:none;display:flex;flex-direction:column;gap:8px}
  .menuList li{
    background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:12px;
    padding:10px 12px 10px 40px;font-size:14px;position:relative;
  }
  .menuList li::before{
    content:attr(data-n);position:absolute;left:12px;top:11px;

  .toolLinks{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .toolLink{
    display:inline-flex;align-items:center;gap:6px;text-decoration:none;

  }
  .toolLink:hover{background:var(--breath);color:#0d2630}
  .again{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
  .abtn{
    appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);
    font-family:var(--jp);font-weight:900;font-size:13px;padding:10px 16px;border-radius:999px;cursor:pointer;transition:.15s;
  }
  .abtn:hover{border-color:var(--brass);color:var(--brass)}
  .abtn.main{background:var(--brass);color:#1a1206;border-color:var(--brass)}
  .abtn.main:hover{filter:brightness(1.08);color:#1a1206}

  footer{margin-top:34px;color:var(--muted);font-size:13px;text-align:center;border-top:1px solid var(--line);padding-top:20px}
  footer b{color:var(--brass)}
</style>

const BRANCH={
  high:{q:'高い音、どんなふうに出ない？',opts:[
    {id:'airy',em:'💨',label:'かすれてスカスカ、音にならない'},
    {id:'tense',em:'😣',label:'力んでしまって苦しい'},
    {id:'flat',em:'📉',label:'出るけど音程がぶら下がる'}]},
  breath:{q:'息のこと、くわしく教えて！',opts:[

/* ================= フロー ================= */
let inst=null, concern=null;
const flow=$('#flow');

function card(title,sub,opts,onPick){
  const d=document.createElement('div');
  d.className='qcard';
  d.innerHTML=`<div class="qhead"><div class="avatar">🎺</div><div class="qtitle"><small>${sub}</small>${title}</div></div><div class="opts"></div>`;
  const box=d.querySelector('.opts');
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="em">${o.em||''}</span>${o.label||o.name}`;
    b.addEventListener('click',()=>{
      if(d.classList.contains('answered'))return;
      d.classList.add('answered');b.classList.add('picked');
      onPick(o);
      setTimeout(()=>{window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});},80);
    });
    box.appendChild(b);
  });
  flow.appendChild(d);
}

function start(){
  flow.innerHTML='';inst=null;concern=null;
  card('あなたの楽器は？','Question 1',INSTS,o=>{inst=o;askConcern();});
}
function askConcern(){
  const list=inst.fam==='perc'?CONCERNS_PERC:inst.fam==='string'?CONCERNS_CB:CONCERNS_WIND;
  card(`${inst.name}だね！ どんなことで悩んでる？`,'Question 2',list,o=>{
    concern=o;
    if(isWind(inst)&&BRANCH[o.id]){
      const br=BRANCH[o.id];
      card(br.q,'Question 3',br.opts,b=>showAdvice(o.id+'/'+b.id,b.label));
    }else{
      showAdvice(o.id,null);
    }
  });
}
function pickTip(tips){
  if(!tips)return null;
  return tips[inst.id]||tips[inst.fam==='reed'?'reed':inst.fam]||tips.all||null;
}
function showAdvice(key,branchLabel){
  const a=ADVICE[key];
  if(!a){start();return;}
  const tip=pickTip(a.tips);
  const extraTip=a.tips&&a.tips.all&&tip!==a.tips.all?a.tips.all:null;
  const d=document.createElement('div');
  d.className='advice';
  d.innerHTML=`
    <h2>💡 ${a.title}</h2>
    <p class="path">${inst.name} ▸ ${concern.label}${branchLabel?' ▸ '+branchLabel:''}</p>
    <div class="sec why"><h4><span class="bar"></span>なにが起きてる？</h4><p>${a.why}</p></div>
    <div class="sec"><h4><span class="bar"></span>今日からの練習メニュー</h4>
      <ol class="menuList">${a.menu.map((m,i)=>`<li data-n="${i+1}">${m}</li>`).join('')}</ol>
    </div>
    ${tip?`<div class="sec tip"><h4><span class="bar"></span>${inst.name}のワンポイント</h4><div class="tipBox">${tip}${extraTip?'<br><b>＋</b> '+extraTip:''}</div></div>`:''}
    <div class="sec"><h4><span class="bar"></span>このアプリで練習するなら</h4>
      <div class="toolLinks">${a.links.map(l=>`<a class="toolLink" href="${l[0]}">${l[1]}</a>`).join('')}</div>
    </div>
    <div class="again">
      <button class="abtn main" id="againConcern">同じ楽器で別の悩みを相談</button>
      <button class="abtn" id="againAll">最初からやり直す</button>
    </div>`;
  flow.appendChild(d);
  d.querySelector('#againConcern').addEventListener('click',()=>{flow.innerHTML='';askConcern();window.scrollTo({top:0,behavior:'smooth'});});
  d.querySelector('#againAll').addEventListener('click',()=>{start();window.scrollTo({top:0,behavior:'smooth'});});
  setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),80);
}
start();
